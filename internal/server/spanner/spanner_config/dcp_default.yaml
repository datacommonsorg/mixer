# Spanner search configuration profile for DCP custom instances (using base_text_embedding)
search_config:
  search_algorithm: "vector_search"
  embedding_model: "NodeEmbeddingModel"
  embedding_model_endpoint: "text-embedding-005"
  embedding_table: "NodeEmbedding"
  query_task_type: "RETRIEVAL_QUERY"
  embedding_label: "base_text_embedding"
  vector_search_algo: "ANN"
  limit: 50
  num_leaves: 10
  threshold: 0.5
postprocessing:
  - "none"
