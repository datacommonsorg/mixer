project: datcom-mixer-autopush
cluster_prefix: mixer

# Helm config
mixer:
  image:
    tag: ""
  hostProject: datcom-mixer-autopush
  serviceName: autopush.api.datacommons.org
  project: datcom-mixer-autopush
  cluster_prefix: mixer
  redis:
    enabled: true
    configFile: |
      instances:
        - region: "us-central1"
          host: "10.244.163.180"
          port: "6379"
  enableOtlp: true

ingress:
  enabled: true
  name: mixer-ingress-autopush
  annotations:
    {
      ingress.gcp.kubernetes.io/pre-shared-cert: "mixer-certificate,multi-domain-2026",
    }

# TODO(/v2/resolve cleanup): Remove this once /v2/resolve always requires an api key.
esp:
  v2_resolve_allow_unregistered: false

# GCP level config.
ip: 34.117.145.125
region: us-central1
api_title: DataCommons API (Autopush)
nodes: 4

serviceGroups:
  svg:
    urlPaths:
      - "/place/stat-var-group/*"
      - "/stat-var/*"
      - "/v1/info/variable-group/*"
      - "/v1/variable/*"
      - "/v1/bulk/info/variable-group"
      - "/v2/bulk/info/variable-group"
    replicas: 5
    resources:
      memoryRequest: "8Gi"
      memoryLimit: "8Gi"
      cpuRequest: "125m"
    cacheSVG: true
    goMemLimit: "6GiB"
    # If the name of the recon service is changed here,
    # please also change the name in the deployment.yaml template.
  recon:
    enableEmbeddingsSidecar: true
    urlPaths:
      - "/v1/recon/*"
      - "/v2/resolve"
    replicas: 20
    resources:
      memoryRequest: "1Gi"
      memoryLimit: "1Gi"
      cpuRequest: "300m"
    goMemLimit: "715MiB"
  observation:
    urlPaths:
      - "/bulk/stats"
      - "/stat/*"
      - "/v1/observations/*"
      - "/v1/bulk/observations/*"
      - "/v2/observation"
    replicas: 20
    resources:
      memoryRequest: "8Gi"
      memoryLimit: "8Gi"
      cpuRequest: "1"
    goMemLimit: "6GiB"
    espResources:
      # Higher memory to accomodate larger payloads
      memoryRequest: "512Mi"
      memoryLimit: "2Gi"
  node:
    urlPaths:
      - "/node/*"
      - "/v1/triples/*"
      - "/v1/properties/*"
      - "/v1/property/values/*"
      - "/v1/bulk/property/values/*"
      - "/v1/bulk/triples/*"
      - "/v1/bulk/properties/*"
      - "/v2/node"
    replicas: 20
    resources:
      memoryRequest: "8Gi"
      memoryLimit: "8Gi"
      cpuRequest: "300m"
    goMemLimit: "6GiB"
    cacheSVG: true
  default:
    urlPaths:
      - "/*"
    replicas: 10
    resources:
      memoryRequest: "1Gi"
      memoryLimit: "1Gi"
      cpuRequest: "50m"
    goMemLimit: "715MiB"

embeddingsSidecar:
  env:
    vertex_ai_models:
      uae-large-v1-model:
        prediction_endpoint_id: "8110162693219942400"
