syntax = "proto3";
package datacommons;

option go_package = "github.com/datacommonsorg/mixer/internal/proto";

// Represents a single topic node in the Knowledge Graph and its immediate children.
message TopicNode {
  // The Data Commons identifier (DCID) of the topic.
  string dcid = 1;
  // The human-readable display name of the topic.
  string name = 2;
  // List of child entity DCIDs (can be Statistical Variables or Sub-Topics).
  repeated string relevant_variables = 3;
}

// Represents the complete processed graph of all topics in the Knowledge Graph.
message TopicHierarchy {
  // List of root topic DCIDs (topics that are never referenced as children by other topics).
  repeated string root_topic_dcids = 1;
  // Map of topic DCID to its populated TopicNode definition.
  map<string, TopicNode> topics = 2;
}

