// This file defines protocol buffer messages used for SDMX REST routing and
// internal SDMX data requests.

syntax = "proto3";

package datacommons.sdmx;
option go_package = "github.com/datacommonsorg/mixer/internal/proto/sdmx";

// Request envelope for SDMX REST APIs.
message SdmxRestRequest {
  // Tail after the SDMX API family route, for example:
  // dataflow/DC/DF_OBS/1.0.0/*
  string tail = 1;
}

// Represents a query for SDMX data.
message SdmxDataQuery {
  // Map of constraints where the key is the dimension ID (e.g., "sex", "age")
  // and the value is a list of allowed values for that dimension.
  map<string, ConstraintList> constraints = 1;
}

// Represents a query for SDMX availability.
message SdmxAvailabilityQuery {
  // Dispatcher/internal component ID to return available values for.
  string component_id = 1;
  // Map of constraints where the key is the dimension ID and the value is a list of allowed values.
  map<string, ConstraintList> constraints = 2;
}

// A list of string values for a constraint.
message ConstraintList {
  // The list of allowed values for the constraint dimension.
  repeated string values = 1;
}

// The result of an SDMX data query.
message SdmxDataResult {
  // The list of observations matching the query.
  repeated SdmxObservation observations = 1;
}

// The result of an SDMX availability query.
message SdmxAvailabilityResult {
  // Available values for the selected component.
  repeated string values = 1;
}

// A pair representing a date and its associated value.
message SdmxDateValue {
  // The date of the observation (e.g., "2020", "2020-01").
  string date = 1;
  // The numeric or string value of the observation.
  string value = 2;
}

// Represents an intermediate observation object containing data and metadata read from the database.
message SdmxObservation {
  // The statistical variable being measured (e.g., "Count_Person").
  string variable_measured = 1;

  // The provenance or source of the data.
  string provenance = 2;

  // The time series of dates and values for this observation.
  repeated SdmxDateValue dates_and_values = 3;

  // SDMX dimensions that identify the observation (e.g., entity, unit, measurementMethod).
  map<string, string> dimensions = 4;

  // SDMX attributes that provide metadata about the observation (e.g., scalingFactor).
  map<string, string> attributes = 5;
}
