// This file defines protocol buffer messages used for SDMX REST routing and
// internal SDMX data requests.

syntax = "proto3";

package datacommons.sdmx;
option go_package = "github.com/datacommonsorg/mixer/internal/proto/sdmx";

// Request envelope for SDMX REST APIs.
message SdmxRestRequest {
  // Tail after the SDMX API family route, for example:
  // dataflow/DC/DF_OBS/1.0.0/*
  string tail = 1;
}

// Represents a query for SDMX data.
message SdmxDataQuery {
  // Map of constraints where the key is the dimension ID (e.g., "sex", "age")
  // and the value is a list of allowed values for that dimension.
  map<string, ConstraintList> constraints = 1;
}

// Represents a query for SDMX availability.
message SdmxAvailabilityQuery {
  // Dispatcher/internal component ID to return available values for.
  string component_id = 1;
  // Map of constraints where the key is the dimension ID and the value is a list of allowed values.
  map<string, ConstraintList> constraints = 2;
}

// A list of string values for a constraint.
message ConstraintList {
  // The list of allowed values for the constraint dimension.
  repeated string values = 1;
}

// The result of an SDMX data query.
message SdmxDataResult {
  // The resolved SDMX component shape for this response.
  SdmxDataShape shape = 1;

  // The time series matching the query.
  repeated SdmxTimeSeries series = 2;
}

// The result of an SDMX availability query.
message SdmxAvailabilityResult {
  // Available values for the selected component.
  repeated string values = 1;
}

// Ordered SDMX component shape for a data response.
message SdmxDataShape {
  // Components in the deterministic order used by all SDMX renderers.
  repeated SdmxComponent components = 1;
}

// A single SDMX component.
message SdmxComponent {
  // Component ID, e.g. "variableMeasured" or "TIME_PERIOD".
  string id = 1;

  // Component role in the SDMX data shape.
  SdmxComponentKind kind = 2;
}

// SDMX component role.
enum SdmxComponentKind {
  SDMX_COMPONENT_KIND_UNSPECIFIED = 0;
  SDMX_COMPONENT_KIND_DIMENSION = 1;
  SDMX_COMPONENT_KIND_MEASURE = 2;
  SDMX_COMPONENT_KIND_ATTRIBUTE = 3;
}

// Represents an intermediate SDMX time series read from the database.
message SdmxTimeSeries {
  // Series-level SDMX dimensions, including variableMeasured, entity dimensions, and provenance.
  map<string, string> dimensions = 1;

  // Series-level SDMX attributes, currently scalingFactor.
  map<string, string> attributes = 2;

  // Time/value points for this series.
  repeated SdmxDataPoint points = 3;
}

// A single time/value point in an SDMX time series.
message SdmxDataPoint {
  // TIME_PERIOD value, e.g. "2020" or "2020-01".
  string time_period = 1;

  // OBS_VALUE value.
  string observation_value = 2;
}
