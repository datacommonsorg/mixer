syntax = "proto3";
package datacommons.v2;

import "google/protobuf/struct.proto";

option go_package = "github.com/datacommonsorg/mixer/internal/proto/v2";

// Request payload for the search_indicators tool endpoint.
message SearchIndicatorsRequest {
  string query = 1;
  repeated string places = 2;
  string parent_place = 3;
  int32 per_search_limit = 4;
  optional bool include_topics = 5;
  optional bool expand_topics = 6;
}

// Response payload for the search_indicators tool endpoint.
message SearchIndicatorsResponse {
  message Topic {
    string dcid = 1;
    repeated string member_topics = 2;
    repeated string member_variables = 3;
    repeated string places_with_data = 4;
    string description = 5;
    repeated string alternate_descriptions = 6;
  }

  message Variable {
    string dcid = 1;
    repeated string places_with_data = 2;
    string description = 3;
    repeated string alternate_descriptions = 4;
  }

  message ResolvedPlace {
    string dcid = 1;
    string name = 2;
    repeated string type_of = 3;
  }

  string status = 1;
  map<string, string> dcid_name_mappings = 2;
  map<string, google.protobuf.ListValue> dcid_place_type_mappings = 3;
  repeated Topic topics = 4;
  repeated Variable variables = 5;
  ResolvedPlace resolved_parent_place = 6;
}

// Request payload for the get_observations tool endpoint.
message GetObservationsRequest {
  string variable_dcid = 1;
  string place_dcid = 2;
  optional string child_place_type = 3;
  optional string source_override = 4;
  optional string date = 5;              // accepts "latest", "all", "range", or specific date string.
  optional string date_range_start = 6;
  optional string date_range_end = 7;
}

// Response payload for the get_observations tool endpoint.
message GetObservationsResponse {
  message Node {
    string dcid = 1;
    string name = 2;
    repeated string type_of = 3;
  }

  message FacetMetadata {
    string source_id = 1;
    string import_name = 2;
    string measurement_method = 3;
    string observation_period = 4;
    string provenance_url = 5;
    string unit = 6;
  }

  message AlternativeSource {
    FacetMetadata source_metadata = 1;
    optional int32 places_found_count = 2;
  }

  message TimeSeriesPoint {
    string date = 1;
    double value = 2;
  }

  message PlaceObservation {
    Node place = 1;
    repeated TimeSeriesPoint time_series = 2;
  }

  Node variable = 1;
  Node resolved_parent_place = 2;
  string child_place_type = 3;
  repeated PlaceObservation place_observations = 4;
  FacetMetadata source_metadata = 5;
  repeated AlternativeSource alternative_sources = 6;
}

// Request payload for the get_variable_metadata tool endpoint.
// Both variable_dcids and entity_dcids are strictly required.
message GetVariableMetadataRequest {
  repeated string variable_dcids = 1;
  repeated string entity_dcids = 2;
}

// Response payload for the get_variable_metadata tool endpoint.
message GetVariableMetadataResponse {
  message FacetMetadata {
    string id = 1;
    string provenance_id = 2;
    int32 obs_count = 3;

    message DateRange {
      string start = 1;
      string end = 2;
    }
    DateRange date_range = 4;

    message Scope {
      repeated string entity_coverage = 1;
      repeated string entity_granularity = 2;
    }
    Scope scope = 5;

    google.protobuf.Struct properties = 6;
  }

  message VariableMetadata {
    string id = 1;
    string name = 2;
    string description = 3;
    google.protobuf.Struct properties = 4;
    repeated FacetMetadata facets = 5;
  }

  message ProvenanceMetadata {
    string id = 1;
    google.protobuf.Struct properties = 2;
  }

  string status = 1;
  map<string, VariableMetadata> variables = 2;
  map<string, ProvenanceMetadata> provenances = 3;
}
